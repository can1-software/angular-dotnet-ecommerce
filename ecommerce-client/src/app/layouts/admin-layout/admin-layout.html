<div class="flex min-h-screen bg-slate-100">

  <!-- SOL SIDEBAR -->
  <aside class="fixed inset-y-0 left-0 z-40 flex w-64 flex-col bg-slate-900 text-white">

    <!-- Logo -->
    <div class="flex h-16 items-center gap-3 border-b border-white/10 px-5">
      <div class="flex h-9 w-9 items-center justify-center rounded-xl bg-gradient-to-br from-brand-400 to-brand-600 shadow-lg">
        <svg class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </div>
      <div>
        <p class="text-sm font-bold leading-none">NovaShop</p>
        <p class="text-[10px] font-medium uppercase tracking-widest text-slate-500">Admin</p>
      </div>
    </div>

    <!-- Menü -->
    <nav class="flex-1 space-y-1 px-3 py-5">
      <p class="mb-2 px-3 text-[10px] font-semibold uppercase tracking-widest text-slate-500">Yönetim</p>

      <a routerLink="/admin/categories" routerLinkActive="bg-brand-600/20 text-brand-400"
         class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium text-slate-400 transition hover:bg-white/5 hover:text-white">
        <svg class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.568 3H5.25A2.25 2.25 0 003 5.25v4.318c0 .597.237 1.17.659 1.591l9.581 9.581c.699.699 1.78.872 2.607.33a18.095 18.095 0 005.223-5.223c.542-.827.369-1.908-.33-2.607L11.16 3.66A2.25 2.25 0 009.568 3z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 6h.008v.008H6V6z" />
        </svg>
        Kategoriler
      </a>

      <!-- İleride eklenecek menü öğeleri -->
      <span class="flex cursor-not-allowed items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium text-slate-600">
        <svg class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z" />
        </svg>
        Ürünler
        <span class="ml-auto rounded-md bg-slate-800 px-1.5 py-0.5 text-[10px] text-slate-500">yakında</span>
      </span>
    </nav>

    <!-- Alt: mağazaya dön -->
    <div class="border-t border-white/10 p-4">
      <a routerLink="/" class="flex items-center gap-2 rounded-xl px-3 py-2.5 text-sm font-medium text-slate-400 transition hover:bg-white/5 hover:text-white">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
        </svg>
        Mağazaya Dön
      </a>
    </div>
  </aside>

  <!-- SAĞ TARAF: Header + İçerik -->
  <div class="ml-64 flex min-h-screen flex-1 flex-col">

    <!-- ÜST HEADER -->
    <header class="sticky top-0 z-30 flex h-16 items-center justify-between border-b border-slate-200 bg-white px-6 shadow-sm">
      <div>
        <p class="text-xs font-medium text-slate-400">Admin Panel</p>
        <h1 class="text-lg font-bold text-slate-900">{{ pageTitle() }}</h1>
      </div>

      <div class="flex items-center gap-4">
        <div class="hidden items-center gap-3 sm:flex">
          <div class="flex h-8 w-8 items-center justify-center rounded-full bg-gradient-to-br from-brand-400 to-brand-600 text-xs font-bold text-white">
            {{ authService.user()?.fullName?.charAt(0)?.toUpperCase() }}
          </div>
          <div class="text-right leading-tight">
            <p class="text-sm font-semibold text-slate-900">{{ authService.user()?.fullName }}</p>
            <p class="text-xs text-brand-600">Admin</p>
          </div>
        </div>
        <button type="button" (click)="logout()"
                class="rounded-xl border border-slate-200 px-3 py-2 text-xs font-semibold text-slate-600 transition hover:border-red-200 hover:bg-red-50 hover:text-red-600">
          Çıkış Yap
        </button>
      </div>
    </header>

    <!-- SAYFA İÇERİĞİ -->
    <main class="flex-1 p-6">
      <router-outlet />
    </main>
  </div>
</div>
