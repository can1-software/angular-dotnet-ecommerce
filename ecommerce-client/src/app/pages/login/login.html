<div class="relative flex min-h-[calc(100vh-4rem)] items-center justify-center overflow-hidden bg-surface-950 px-4 py-12">

  <!-- Dekoratif arka plan -->
  <div class="pointer-events-none absolute inset-0">
    <div class="absolute left-1/2 top-0 h-[500px] w-[500px] -translate-x-1/2 rounded-full bg-brand-600/15 blur-3xl"></div>
    <div class="absolute inset-0 bg-[linear-gradient(to_right,#ffffff06_1px,transparent_1px),linear-gradient(to_bottom,#ffffff06_1px,transparent_1px)] bg-[size:3rem_3rem]"></div>
  </div>

  <div class="relative w-full max-w-md">
    <!-- Kart -->
    <div class="card-glass p-8 sm:p-10">
      <!-- Başlık -->
      <div class="mb-8 text-center">
        <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-2xl bg-gradient-to-br from-brand-400 to-brand-600 shadow-lg shadow-brand-500/30">
          <svg class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" />
          </svg>
        </div>
        <h1 class="text-2xl font-extrabold tracking-tight text-slate-900">Tekrar hoş geldin</h1>
        <p class="mt-1.5 text-sm text-slate-500">Hesabına giriş yap ve alışverişe devam et.</p>
      </div>

      <!-- Hata mesajı -->
      @if (errorMessage()) {
        <div class="mb-5 flex items-start gap-3 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
          <svg class="mt-0.5 h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
          </svg>
          {{ errorMessage() }}
        </div>
      }

      <form (ngSubmit)="onSubmit()" class="space-y-5">
        <div>
          <label class="label-field" for="email">E-posta</label>
          <input id="email" type="email" name="email" [(ngModel)]="email" required
                 placeholder="ornek@mail.com" class="input-field" />
        </div>

        <div>
          <label class="label-field" for="password">Şifre</label>
          <input id="password" type="password" name="password" [(ngModel)]="password" required
                 placeholder="••••••••" class="input-field" />
        </div>

        <button type="submit" [disabled]="loading()" class="btn-primary w-full !py-3.5 !text-base">
          @if (loading()) {
            <svg class="h-4 w-4 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
            </svg>
            Giriş yapılıyor...
          } @else {
            Giriş Yap
          }
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-slate-500">
        Hesabın yok mu?
        <a routerLink="/register" class="font-semibold text-brand-600 hover:text-brand-500 transition-colors">Kayıt ol</a>
      </p>
    </div>
  </div>
</div>
