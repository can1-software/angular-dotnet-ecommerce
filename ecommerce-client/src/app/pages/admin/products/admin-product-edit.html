<div class="max-w-xl">
  <a routerLink="/admin/products" class="mb-6 inline-flex items-center gap-1.5 text-sm font-medium text-slate-500 hover:text-slate-800">
    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
    </svg>
    Ürünlere Dön
  </a>

  @if (pageLoading()) {
    <div class="flex items-center justify-center py-16 text-slate-400">Yükleniyor...</div>
  } @else {
    <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm sm:p-8">
      <h2 class="mb-6 text-lg font-bold text-slate-900">Ürün Düzenle</h2>

      @if (errorMessage()) {
        <div class="mb-5 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">{{ errorMessage() }}</div>
      }

      <form (ngSubmit)="onSubmit()" class="space-y-5">
        <div>
          <label class="label-field" for="name">Ürün Adı</label>
          <input id="name" type="text" name="name" [(ngModel)]="name" required class="input-field" />
        </div>

        <div>
          <label class="label-field" for="description">Açıklama</label>
          <textarea id="description" name="description" [(ngModel)]="description" rows="3" class="input-field resize-none"></textarea>
        </div>

        <div class="grid gap-4 sm:grid-cols-2">
          <div>
            <label class="label-field" for="price">Fiyat (₺)</label>
            <input id="price" type="number" name="price" [(ngModel)]="price" required min="0.01" step="0.01" class="input-field" />
          </div>
          <div>
            <label class="label-field" for="stock">Stok</label>
            <input id="stock" type="number" name="stock" [(ngModel)]="stock" required min="0" class="input-field" />
          </div>
        </div>

        <div>
          <label class="label-field" for="categoryId">Kategori</label>
          <select id="categoryId" name="categoryId" [(ngModel)]="categoryId" required class="input-field">
            @for (cat of categories(); track cat.id) {
              <option [ngValue]="cat.id">{{ cat.name }}</option>
            }
          </select>
        </div>

        <div>
          <label class="label-field" for="image">Ürün Resmi</label>
          @if (currentImageUrl() && !imagePreview()) {
            <div class="mb-3">
              <p class="mb-2 text-xs text-slate-500">Mevcut resim</p>
              <img [src]="currentImageUrl()" [alt]="name" class="h-28 w-28 rounded-xl border border-slate-200 object-cover" />
            </div>
          }
          <input id="image" type="file" accept="image/jpeg,image/png,image/webp"
                 (change)="onImageSelected($event)" class="input-field !py-2 file:mr-3 file:rounded-lg file:border-0 file:bg-brand-50 file:px-3 file:py-1.5 file:text-sm file:font-semibold file:text-brand-700" />
          <p class="mt-1 text-xs text-slate-500">Yeni resim seçmezseniz mevcut resim korunur.</p>
          @if (imagePreview()) {
            <div class="mt-3 flex items-start gap-3">
              <img [src]="imagePreview()" alt="Yeni önizleme" class="h-24 w-24 rounded-xl border border-slate-200 object-cover" />
              <button type="button" (click)="clearNewImage()" class="text-sm font-medium text-red-600 hover:text-red-700">Yeni resmi iptal et</button>
            </div>
          }
        </div>

        <div class="flex gap-3 pt-2">
          <button type="submit" [disabled]="loading()" class="btn-primary">
            @if (loading()) { Kaydediliyor... } @else { Güncelle }
          </button>
          <a routerLink="/admin/products" class="btn-secondary">İptal</a>
        </div>
      </form>
    </div>
  }
</div>
