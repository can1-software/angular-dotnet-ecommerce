<header class="sticky top-0 z-50 border-b border-white/10 bg-surface-950/80 backdrop-blur-xl">
  <div class="mx-auto flex h-16 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">

    <!-- Logo -->
    <a routerLink="/" class="group flex items-center gap-3">
      <div class="flex h-9 w-9 items-center justify-center rounded-xl bg-gradient-to-br from-brand-400 to-brand-600 shadow-lg shadow-brand-500/30 transition-transform duration-300 group-hover:scale-105">
        <svg class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007zM8.625 10.5a.375.375 0 11-.75 0 .375.375 0 01.75 0zm7.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
        </svg>
      </div>
      <div class="flex flex-col leading-none">
        <span class="text-base font-bold tracking-tight text-white">NovaShop</span>
        <span class="text-[10px] font-medium uppercase tracking-widest text-slate-500">Premium Store</span>
      </div>
    </a>

    <!-- Navigasyon -->
    <nav class="flex items-center gap-2 sm:gap-3">
      @if (!authService.isLoggedIn()) {
        <a routerLink="/login" class="btn-ghost hidden sm:inline-flex">Giriş Yap</a>
        <a routerLink="/register" class="btn-primary !py-2 !px-4 text-xs sm:text-sm">Kayıt Ol</a>
      } @else {
        <!-- Kullanıcı bilgisi -->
        <div class="hidden items-center gap-3 sm:flex">
          <div class="flex h-8 w-8 items-center justify-center rounded-full bg-gradient-to-br from-brand-400 to-brand-600 text-xs font-bold text-white shadow-md">
            {{ authService.user()?.fullName?.charAt(0)?.toUpperCase() }}
          </div>
          <div class="flex flex-col leading-tight">
            <span class="text-xs text-slate-500">Hoş geldin</span>
            <span class="text-sm font-semibold text-white">{{ authService.user()?.fullName }}</span>
          </div>
        </div>
        <button type="button" (click)="logout()" class="btn-ghost !text-slate-400 hover:!text-red-400">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" />
          </svg>
          <span class="hidden sm:inline">Çıkış</span>
        </button>
      }
    </nav>
  </div>
</header>
