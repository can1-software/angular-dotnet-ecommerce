# Bu dosya, SQL Server veritabanını Docker container içinde çalıştırır.
# Çalıştırmak için:  docker compose up -d
# Durdurmak için:    docker compose down

services:
  sqlserver:
    # Microsoft'un resmi SQL Server 2022 imajı
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ecommerce-sqlserver
    environment:
      # Lisansı otomatik kabul et (geliştirme için)
      ACCEPT_EULA: "Y"
      # 'sa' kullanıcısının şifresi. En az 8 karakter, büyük/küçük harf ve rakam içermeli.
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      # Bilgisayarındaki 1433 portunu container'ın 1433 portuna bağlar
      - "1433:1433"
    volumes:
      # Container silinse bile veriler kaybolmasın diye kalıcı depolama
      - sqlserver_data:/var/opt/mssql

volumes:
  sqlserver_data:
